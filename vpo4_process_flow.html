<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVPF Process Flow Diagram</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f9f8f6;
      --surface: #ffffff;
      --border:  #e0ded8;
      --muted:   #6b6963;
    }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #1a1a18;
      padding: 48px 24px 60px;
    }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 22px; font-weight: 500; letter-spacing: -.3px; }
    header p  { font-size: 14px; color: var(--muted); margin-top: 6px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 24px 48px;
      max-width: 860px;
      margin: 0 auto;
      overflow-x: auto;
    }

    .card svg { display: block; margin: 0 auto; }

    .legend {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px 20px; margin: 32px auto 0; padding-top: 24px;
      border-top: 1px solid var(--border); max-width: 860px;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .sw { width: 13px; height: 13px; border-radius: 3px; border: 1px solid transparent; flex-shrink: 0; }

    footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
